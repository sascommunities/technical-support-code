# DO NOT EDIT THIS FILE
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app: k8s-iotest
    app.kubernetes.io/name: k8s-iotest
  name: k8s-iotest
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app: k8s-iotest
    app.kubernetes.io/name: k8s-iotest
    workload.sas.com/class: {{ WORKLOAD }}
  name: k8s-iotest
spec:
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/component: k8s-iotest-daemon
      app.kubernetes.io/name: k8s-iotest
  template:
    metadata:
      labels:
        app: k8s-iotest
        app.kubernetes.io/component: k8s-iotest-daemon
        app.kubernetes.io/name: k8s-iotest
        workload.sas.com/class: {{ WORKLOAD }}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: workload.sas.com/class
                operator: In
                values:
                - {{ WORKLOAD }}
      automountServiceAccountToken: false
      containers:
      - command:
        - sleep
        - 1d
        image: {{ IMAGE }}
        imagePullPolicy: Always
        name: k8s-iotest
        resources:
            limits:
                cpu: {{ CPULIMIT }}
                memory: {{ MEMLIMIT }}
            requests:
                cpu: 1
                memory: 250Mi
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
                drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: false
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /iotest
          name: iotest
      dnsPolicy: ClusterFirst
      # imagePullSecrets: [{name: {{ IMAGEPULLSECRET }}}]
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        seccompProfile: {type: RuntimeDefault}
        # fsGroup: {{ FSGROUP }}
      serviceAccountName: k8s-iotest
      terminationGracePeriodSeconds: 60
      tolerations:
      - effect: NoSchedule
        key: workload.sas.com/class
        operator: Equal
        value: {{ WORKLOAD }}
      volumes: [{name: iotest,{{ VOLUME }}}]
  updateStrategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 100%
    type: RollingUpdate