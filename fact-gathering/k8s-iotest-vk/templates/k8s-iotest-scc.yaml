# DO NOT EDIT THIS FILE
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
apiVersion: security.openshift.io/v1
defaultAddCapabilities: []
fsGroup:
  ranges:
  - max: {{ FSGROUP }}
    min: {{ FSGROUP }}
  type: MustRunAs
groups:
kind: SecurityContextConstraints
metadata:
  annotations:
    kubernetes.io/description: scc for k8s-iotest service account
  name: k8s-iotest
priority: 0
readOnlyRootFilesystem: false
requiredDropCapabilities:
- KILL
- MKNOD
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
seccompProfiles:
- runtime/default
supplementalGroups:
  type: RunAsAny
volumes:
- {{ VOLUME_TYPE }}